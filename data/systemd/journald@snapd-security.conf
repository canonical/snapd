# Journald configuration for the snapd security log namespace.
# This namespace isolates security audit events (login, access control)
# from the main system journal.
[Journal]
Storage=persistent
Compress=yes
SystemMaxFileSize=10M
SystemMaxUse=10M
SyncIntervalSec=30s
SyncOnShutdown=yes
RateLimitIntervalSec=30s
RateLimitBurst=10000
