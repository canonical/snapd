summary: roll back failed transactional boot base and base refresh on UC20+

details: |
  Verify that a transactional refresh of the boot base and an extra base snap
  rolls back on Ubuntu Core when the extra base snap becomes unavailable for
  download from the store after the transaction has started.

systems:
  - ubuntu-20.04-64
  - ubuntu-22.04-64
  - ubuntu-24.04-64
  - ubuntu-26.04-64

environment:
  NESTED_ENABLE_TPM: true
  NESTED_ENABLE_SECURE_BOOT: true
  NESTED_BUILD_SNAPD_FROM_CURRENT: true
  NESTED_REPACK_GADGET_SNAP: true
  NESTED_REPACK_KERNEL_SNAP: true
  NESTED_REPACK_BASE_SNAP: true
  NESTED_REPACK_FOR_FAKESTORE: true
  NESTED_FAKESTORE_BLOB_DIR: $(pwd)/fake-store-blobdir
  NESTED_SIGN_SNAPS_FAKESTORE: true
  NESTED_UBUNTU_IMAGE_SNAPPY_FORCE_SAS_URL: http://localhost:11028

skip:
  - reason: This test needs test keys to be trusted
    if: |
      [ "$TRUST_TEST_KEYS" = "false" ]

prepare: |
  snap install test-snapd-swtpm --edge

  "${TESTSTOOLS}/store-state" setup-fake-store "${NESTED_FAKESTORE_BLOB_DIR}"

  cp "${TESTSLIB}/assertions/testrootorg-store.account-key" "${NESTED_FAKESTORE_BLOB_DIR}/asserts"
  cp "${TESTSLIB}/assertions/developer1.account" "${NESTED_FAKESTORE_BLOB_DIR}/asserts"
  cp "${TESTSLIB}/assertions/developer1.account-key" "${NESTED_FAKESTORE_BLOB_DIR}/asserts"

  version="$(tests.nested show version)"
  base_snap="core${version}"
  gendeveloper1 sign-model < "$TESTSLIB/assertions/developer1-${version}-dangerous.json" > boot-base-plus-base-refresh.model

  tests.nested prepare-essential-snaps

  cp -r "$TESTSLIB/snaps/test-snapd-base" ./test-snapd-base-src
  # shellcheck disable=SC2016
  gojq --yaml-input --yaml-output --arg version "v1" '.version = $version' test-snapd-base-src/meta/snap.yaml > snap.yaml.new
  mv snap.yaml.new test-snapd-base-src/meta/snap.yaml
  snap pack --filename=./test-snapd-base-rev1.snap ./test-snapd-base-src
  rm -rf test-snapd-base-src
  "${TESTSTOOLS}/store-state" make-snap-installable --noack --revision 1 \
    "${NESTED_FAKESTORE_BLOB_DIR}" ./test-snapd-base-rev1.snap \
    QSqc0HnPKbG2V6YFh9LtR3mW8dXaJ5Ne
  "${TESTSTOOLS}/store-state" add-to-channel "${NESTED_FAKESTORE_BLOB_DIR}" \
    ./test-snapd-base-rev1.snap latest/stable

  snapd_snap="$(echo /tmp/extra-snaps/snapd_*.snap)"

  export SNAPPY_FORCE_API_URL="${NESTED_UBUNTU_IMAGE_SNAPPY_FORCE_SAS_URL}"
  ubuntu-image snap --image-size 10G ./boot-base-plus-base-refresh.model \
    --snap /tmp/extra-snaps/pc.snap \
    --snap /tmp/extra-snaps/pc-kernel.snap \
    --snap "${snapd_snap}" \
    --snap "/tmp/extra-snaps/${base_snap}.snap"

  image_dir=$(tests.nested get images-path)
  image_name=$(tests.nested get image-name core)
  cp ./pc.img "${image_dir}/${image_name}"
  tests.nested configure-default-user

  systemd-run --collect --unit fakedevicesvc fakedevicesvc localhost:11029

  tests.nested build-image core
  tests.nested create-vm core

  remote.wait-for device-initialized

  remote.exec 'sudo systemctl stop snapd snapd.socket'
  remote.exec 'sudo cat /var/lib/snapd/state.json' | gojq '.data.auth.device."session-macaroon" = "fake-session"' > state.json
  remote.push state.json
  remote.exec 'sudo mv state.json /var/lib/snapd/state.json'
  remote.exec 'sudo systemctl start snapd snapd.socket'

  remote.refresh disable-refreshes

restore: |
  systemctl stop fakedevicesvc.service || true
  "${TESTSTOOLS}/store-state" teardown-fake-store "${NESTED_FAKESTORE_BLOB_DIR}" || true

execute: |
  version="$(tests.nested show version)"
  boot_base="core${version}"
  extra_base="test-snapd-base"
  extra_base_id="QSqc0HnPKbG2V6YFh9LtR3mW8dXaJ5Ne"
  boot_base_channel="latest/stable"
  boot_base_id=""

  case "${version}" in
    20)
      boot_base_id="DLqre5XGLbDqg9jPtiAhRRjDuPVa5X1q"
      ;;
    22)
      boot_base_id="amcUKQILKXHHTlmSa7NMdnXSx02dNeeT"
      ;;
    24)
      boot_base_id="dwTAh7MZZ01zyriOZErqd1JynQLiOGvM"
      ;;
    26)
      boot_base_channel="latest/edge"
      boot_base_id="cUqM61hRuZAJYmIS898Ux66VY61gBbZf"
      ;;
    *)
      echo "unsupported nested core version: ${version}" >&2
      exit 1
      ;;
  esac

  make_fake_store_revision() {
    local source_snap="$1"
    local output_snap="$2"
    local snap_id="$3"
    local revision="$4"
    local channel="$5"

    rm -rf squashfs-root
    unsquashfs -d squashfs-root "${source_snap}"

    # shellcheck disable=SC2016
    gojq --yaml-input --yaml-output --arg version "v${revision}" '.version = $version' squashfs-root/meta/snap.yaml > snap.yaml.new
    mv snap.yaml.new squashfs-root/meta/snap.yaml

    snap pack --filename="${output_snap}" ./squashfs-root
    rm -rf squashfs-root

    "${TESTSTOOLS}/store-state" make-snap-installable --noack \
      --revision "${revision}" \
      "${NESTED_FAKESTORE_BLOB_DIR}" \
      "${output_snap}" \
      "${snap_id}"
    "${TESTSTOOLS}/store-state" add-to-channel "${NESTED_FAKESTORE_BLOB_DIR}" "${output_snap}" "${channel}"
  }

  echo "Install the extra base from the fake store"
  remote.exec "sudo snap install ${extra_base}"

  start_boot_base_revision="$(remote.exec "snap list ${boot_base}" | awk 'NR != 1 { print $3 }')"
  start_extra_base_revision="$(remote.exec "snap list ${extra_base}" | awk 'NR != 1 { print $3 }')"
  test -n "${start_boot_base_revision}"
  test -n "${start_extra_base_revision}"

  echo "Publish refreshed boot base and extra base snaps"
  make_fake_store_revision "${NESTED_FAKESTORE_BLOB_DIR}/${boot_base}.snap" "./${boot_base}-rev2.snap" "${boot_base_id}" 2 "${boot_base_channel}"
  make_fake_store_revision "${NESTED_FAKESTORE_BLOB_DIR}/test-snapd-base-rev1.snap" "./test-snapd-base-rev2.snap" "${extra_base_id}" 2 latest/stable

  echo "Refresh the boot base and extra base together"
  initial_boot_id="$(tests.nested boot-id)"
  change_id="$(remote.exec "sudo snap refresh --no-wait --transaction=all-snaps ${extra_base} ${boot_base}")"
  echo "${change_id}" > change-id

  echo "Remove the extra base blob so its later download fails"
  test -f "${NESTED_FAKESTORE_BLOB_DIR}/test-snapd-base-rev2.snap"
  rm -f "${NESTED_FAKESTORE_BLOB_DIR}/test-snapd-base-rev2.snap"

  echo "Wait for the reboot into the refreshed boot base"
  remote.wait-for reboot "${initial_boot_id}"
  rollback_boot_id="$(tests.nested boot-id)"

  echo "Wait for the rollback reboot after the download failure"
  remote.wait-for reboot "${rollback_boot_id}"
  remote.wait-for snap-command

  echo "Wait for the refresh change to fail"
  retry -n 100 --wait 5 sh -c "remote.exec sudo snap changes | MATCH '^${change_id}\\s+(Done|Undone|Error)'"
  remote.exec 'sudo snap changes' | MATCH "^${change_id}\\s+Error"
  not remote.exec "sudo snap watch ${change_id}"
  remote.exec "sudo snap change ${change_id}" > "change-${change_id}.log"

  echo "Verify the live system rolled back to the original revisions"
  remote.exec "snap list ${boot_base}" | awk 'NR != 1 { print $3 }' | MATCH "^${start_boot_base_revision}$"
  remote.exec "snap list ${extra_base}" | awk 'NR != 1 { print $3 }' | MATCH "^${start_extra_base_revision}$"

  echo "Verify the change failed while downloading the extra base and undid the boot base"
  MATCH "Download snap \"${extra_base}\"" < "change-${change_id}.log"
  MATCH "cannot.*${extra_base}" < "change-${change_id}.log"
  MATCH "Undone.*Make snap \"${boot_base}\" .* available" < "change-${change_id}.log"
