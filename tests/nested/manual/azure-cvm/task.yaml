summary: Check installation of Azure CVM kernel

details: |
  This test checks that we are able to perform a single-boot installation of
  Azure CVM kernel

# Limit to noble+
systems: [ubuntu-2*]

environment:
  NESTED_ENABLE_TPM/none: false
  NESTED_ENABLE_SECURE_BOOT/none: false

prepare: |
  # only test on Noble and more
  if os.query is-ubuntu-lt 24.04; then
      echo "test only run on Noble and more recent"
      return
  fi

  # carries ubuntu-core-initramfs
  quiet add-apt-repository ppa:snappy-dev/image -y

  # TODO: install the linux-firmware as the current version of
  # ubuntu-core-initramfs does not depend on it, but nonetheless requires it
  # to build the initrd, also install the linux-azure kernel
  quiet apt install ubuntu-core-initramfs linux-firmware linux-azure -y

  if [ "$SPREAD_REBOOT" = "0" ]; then
      REBOOT
  fi

  # verify after the first reboot that we are now running an Azure kernel
  if [ "$SPREAD_REBOOT" = "1" ]; then
    KERNEL_TYPE=$(uname -r | rev | cut -d'-' -f1 | rev)
    if [ "$KERNEL_TYPE" != "azure" ]; then
        echo "not running expected -azure kernel"
        exit 1
    fi
  fi

execute: |  
  #shellcheck source=tests/lib/nested.sh
  . "$TESTSLIB"/nested.sh
  
  # build initramfs
  ubuntu-core-initramfs create-initrd --kernelver "$(uname -r)"

  # build UKI
  ubuntu-core-initramfs create-efi --unsigned --kernelver "$(uname -r)" --cmdline "snapd_recovery_mode=cloudimg-rootfs console=tty1 console=ttyS0 earlyprintk=ttyS0 snapd.debug=1 systemd.journald.forward_to_console=1"

  UKI_FILE="$(ls /boot/kernel.efi*-azure)"

  # move UKI to ESP
  mv $UKI_FILE /boot/efi/EFI/ubuntu

  # add UKI to boot entries
  efibootmgr --create --disk /dev/sda --part 15 --label "CVM UKI" --loader "\EFI\ubuntu\$(basename $UKI_FILE)"

  if [ "$SPREAD_REBOOT" = "0" ]; then
      REBOOT
  fi

  # verify that we are still running an Azure kernel
  if [ "$SPREAD_REBOOT" = "1" ]; then
    KERNEL_TYPE=$(uname -r | rev | cut -d'-' -f1 | rev)
    if [ "$KERNEL_TYPE" != "azure" ]; then
        echo "not running expected -azure kernel"
        exit 1
    fi
  fi

  # tests.nested build-image core
  # tests.nested create-vm core
