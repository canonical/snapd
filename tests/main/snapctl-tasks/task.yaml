summary: Ensure snapctl tasks reports change status correctly

details: |
  Verifies that snapctl tasks correctly reports change status for changes
  initiated by a snap via snapctl. Two component removals are triggered via
  snapctl remove --no-wait from the snap's app context.

  For the first change, snapctl tasks is called immediately after --no-wait
  returns to verify the command works and prints the change while it is still
  in progress (Doing state). The change ID and table header are verified to
  be present in the output, and the status is confirmed to not yet be Done.

  For the second change, snapctl is-ready is polled until the change reaches
  the Done state, then snapctl tasks is called to verify it correctly reports
  the completed change with Done status.

systems: [ubuntu-16.04-64, ubuntu-18.04-64, ubuntu-2*, ubuntu-core-*, fedora-*]

prepare: |
  snap pack test-snap/
  snap pack test-comp1/
  snap pack test-comp2/
  snap install --dangerous test-snapctl-tasks_1.0_all.snap
  snap install --dangerous "test-snapctl-tasks+comp1_1.0.comp"
  snap install --dangerous "test-snapctl-tasks+comp2_1.0.comp"

restore: |
  snap remove --purge test-snapctl-tasks || true

execute: |
  # Poll is-ready until the given change ID reaches Done (exit 0),
  # failing if the change errors (exit 2+) or times out.
  wait_for_change() {
    local change_id="$1"
    for _ in $(seq 30); do
      exit_code=0
      snap run --shell test-snapctl-tasks.app -c "snapctl is-ready $change_id" || exit_code=$?
      if [ "$exit_code" -eq 0 ]; then
        return 0
      elif [ "$exit_code" -ge 2 ]; then
        echo "Change $change_id completed with error (exit $exit_code)"
        return 1
      fi
      sleep 1
    done
    echo "Timed out waiting for change $change_id"
    return 1
  }

  echo "Remove comp1 via snapctl --no-wait to get an in-progress change"
  CHANGE_ID_1=$(snap run --shell test-snapctl-tasks.app -c 'snapctl remove +comp1 --no-wait')
  test -n "$CHANGE_ID_1"

  echo "Query tasks immediately while comp1 removal is in progress ($CHANGE_ID_1)"
  OUTPUT=$(snap run --shell test-snapctl-tasks.app -c "snapctl tasks $CHANGE_ID_1")
  echo "tasks output for in-progress change: $OUTPUT"

  echo "Verify the table header is printed"
  echo "$OUTPUT" | MATCH "ID\s+Status"

  echo "Verify the change ID appears in the output"
  echo "$OUTPUT" | MATCH "$CHANGE_ID_1"

  echo "Verify the change has not yet completed (status is not Done)"
  echo "$OUTPUT" | NOMATCH "Done"

  echo "Wait for comp1 removal to complete before starting second test"
  wait_for_change "$CHANGE_ID_1"

  echo "Remove comp2 via snapctl --no-wait"
  CHANGE_ID_2=$(snap run --shell test-snapctl-tasks.app -c 'snapctl remove +comp2 --no-wait')
  test -n "$CHANGE_ID_2"

  echo "Wait for comp2 removal to reach Done state"
  wait_for_change "$CHANGE_ID_2"

  echo "Query tasks for completed change ($CHANGE_ID_2)"
  OUTPUT=$(snap run --shell test-snapctl-tasks.app -c "snapctl tasks $CHANGE_ID_2")
  echo "tasks output for completed change: $OUTPUT"

  echo "Verify the table header is printed"
  echo "$OUTPUT" | MATCH "ID\s+Status"

  echo "Verify the change ID appears in the output"
  echo "$OUTPUT" | MATCH "$CHANGE_ID_2"

  echo "Verify the change is reported as Done"
  echo "$OUTPUT" | MATCH "Done"
