summary: Ensure that snapctl is-ready command works.

details: |
  Verifies that the snapctl is-ready command correctly reports the status of a
  change initiated by a snap via snapctl. A test snap with a component is
  installed locally. The component is then removed via snapctl (from within the
  snap's app context using snap run --shell), which creates a snapctl-remove
  change marked with the initiated-by-snap change key for the calling snap.
  The implementation also tracks last-access information in the in-memory state
  cache rather than as a change attribute. is-ready is then called against that
  change ID to verify it reports Done and exits successfully.

  Also verifies that is-ready fails appropriately for invalid change IDs, wrong
  argument counts, and changes not initiated by the calling snap.

systems: [ubuntu-16.04-64, ubuntu-18.04-64, ubuntu-2*, ubuntu-core-*, fedora-*]

prepare: |
  snap pack test-snap/
  snap pack test-comp/
  snap install --dangerous test-snapctl-is-ready_1.0_all.snap
  snap install --dangerous test-snapctl-is-ready+comp_1.0.comp

execute: |
  echo "Remove component via snapctl to create a snapctl-remove change"
  snap run test-snapctl-is-ready.app snapctl remove +comp

  CHANGE_ID=$(snap debug api /v2/changes?select=all | \
    gojq --raw-output '[.result[] | select(.kind == "snapctl-remove")] | last | .id')

  test -n "$CHANGE_ID"
  test "$CHANGE_ID" != "null"

  echo "snapctl is-ready exits 0 for a completed change (stdout is empty; exit code conveys status)"
  snap run test-snapctl-is-ready.app snapctl is-ready "$CHANGE_ID"

  echo "snapctl is-ready fails with exit 3 for an invalid change ID"
  snap run test-snapctl-is-ready.app snapctl is-ready nonexistent-id || test $? -eq 3

  echo "snapctl is-ready fails with too few arguments"
  not snap run test-snapctl-is-ready.app snapctl is-ready

  echo "snapctl is-ready fails with too many arguments"
  not snap run test-snapctl-is-ready.app snapctl is-ready "$CHANGE_ID" extra-arg

  echo "snapctl is-ready fails for a change not initiated by the snap"
  INSTALL_CHANGE_ID=$(snap install --no-wait test-snapd-tools)
  snap run test-snapctl-is-ready.app snapctl is-ready "$INSTALL_CHANGE_ID" || test $? -eq 3
