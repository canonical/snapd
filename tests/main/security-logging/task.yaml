summary: Checks that security audit events are written to the kernel audit log

details: |
    The snapd daemon writes structured security audit events via the kernel
    audit subsystem (AUDIT_TRUSTED_APP, type 1121). This test verifies that
    a failed login attempt produces an "authn_login_failure" event and,
    when store credentials are available, that a successful login produces
    an "authn_login_success" event in the audit log. It also checks that
    user lifecycle events (user_created, user_updated, user_removed) are
    recorded when users are created via login, updated on re-login, and
    removed via logout. Finally it verifies that authorization events are
    emitted for successful and rejected admin API calls (authz_admin and
    authz_fail) when the endpoint requires access above open.

# Amazon Linux 2: systemd-journald-audit.socket is not available
systems: [ -amazon-linux-2-64 ]

prepare: |
    # Enable the kernel audit subsystem if it isn't already enabled.
    python3 -c "
    import socket, struct
    NETLINK_AUDIT = 9
    AUDIT_SET = 1001
    NLM_F_REQUEST = 1
    # audit_status struct: mask=1 (AUDIT_STATUS_ENABLED), enabled=1, rest zeroed
    status = struct.pack('IIIIIIiii', 1, 1, 0, 0, 0, 0, 0, 0, 0)
    hdr = struct.pack('IHHII', 16 + len(status), AUDIT_SET, NLM_F_REQUEST, 1, 0)
    s = socket.socket(socket.AF_NETLINK, socket.SOCK_RAW, NETLINK_AUDIT)
    s.sendto(hdr + status, (0, 0))
    s.close()
    "

    if ! systemctl is-active systemd-journald-audit.socket; then
        touch audit-socket-was-inactive
        systemctl stop systemd-journald.service
        systemctl start systemd-journald-audit.socket
        systemctl restart systemd-journald.service
    fi
    systemctl restart snapd.service

restore: |
    if [ -f audit-socket-was-inactive ]; then
        systemctl stop systemd-journald-audit.socket
        systemctl restart systemd-journald.service
        rm -f audit-socket-was-inactive
    fi

    snap logout || true
    snap remove --purge test-snapd-sh > /dev/null 2>&1 || true

execute: |
    # Pin snapd journal search position to the current journal position
    journal_pin() {
        "$TESTSTOOLS"/journal-state start_new_log
    }

    # Assert that journal logs since the pinned position match expression
    # Usage: journal_match <expression> [-u <unit>]
    journal_match() {
        local expression="$1"; shift
        "$TESTSTOOLS"/journal-state match-log "$expression" -n 3 "$@" >/dev/null 2>&1
    }

    echo "Checking that the security logger is disabled in snapd stop and enabled on snapd start"
    journal_pin
    systemctl restart snapd.service
    snap wait system seed.loaded
    journal_match "security logger disabled" -u snapd.service
    journal_match "security logger enabled" -u snapd.service

    echo "Checking that restart produces disable/enable audit events"
    journal_match '"level":"INFO","description":"Security logging enabled","app_id":"canonical.snapd.snapd","type":"security","category":"SYS","event":"sys_logging_enabled"'
    journal_match '"level":"CRITICAL","description":"Security logging disabled","app_id":"canonical.snapd.snapd","type":"security","category":"SYS","event":"sys_logging_disabled"'

    echo "Checking that a failed login attempt produces an audit event"
    echo '{"email":"someemail@testing.com","password":"wrong-password"}' | \
        snap debug api -X POST -H 'Content-Type: application/json' /v2/login || true

    journal_match '"level":"WARN","description":"User <unknown>:someemail@testing.com:<unknown> login failure: invalid-credentials:invalid credentials","app_id":"canonical.snapd.snapd","type":"security","category":"AUTHN","event":"authn_login_failure","user":{"snapd-user-id":0,"store-user-name":"","store-user-email":"someemail@testing.com","expiration":"never"},"error":{"code":401,"kind":"invalid-credentials","message":"invalid credentials"}'

    echo "Checking that an authorized admin API call produces an authz_admin event"
    journal_pin
    # POST /v2/snaps as root over snapd.socket exercises authenticatedAccess
    # and is authorized via the root check. The body is well-formed JSON so
    # the access check is reached; the change itself may fail asynchronously
    # but that does not affect the audit event we want to test.
    echo '{"action":"install","snaps":["test-snapd-sh"]}' | \
        snap debug api -X POST -H 'Content-Type: application/json' /v2/snaps > /dev/null 2>&1 || true

    journal_match '"level":"INFO","description":"User <unknown>:<unknown>:<unknown> \(peer /run/snapd\.socket:0:[0-9]+\) accessed POST:/v2/snaps:install","app_id":"canonical.snapd.snapd","type":"security","category":"AUTHZ","event":"authz_admin","user":\{"snapd-user-id":0,"store-user-name":"","store-user-email":"","expiration":"never"\},"peer":\{"socket":"/run/snapd\.socket","uid":0,"pid":[0-9]+\},"endpoint":\{"method":"POST","path":"/v2/snaps","action":"install","access-checker":"authenticated","access-level":"authenticated"\},"authz_checks":\{"access-options":"pass","peer-credentials":"pass","socket":"pass","interface-requirements":"not-applicable","open-access":"not-applicable","user-authentication":"fail","root":"pass","polkit":"not-reached"\}'

    echo "Checking that an unauthorized admin API call produces an authz_fail event"
    journal_pin
    # POST /v2/snaps as an unprivileged user over snapd.socket exercises
    # authenticatedAccess without macaroon, root, or polkit authorization.
    runuser -u test -- curl -sS --unix-socket /run/snapd.socket \
        -X POST -H 'Content-Type: application/json' \
        -d '{"action":"install","snaps":["test-snapd-sh"]}' \
        http://localhost/v2/snaps > /dev/null || true

    journal_match '"level":"CRITICAL","description":"Peer /run/snapd\.socket:[1-9][0-9]*:[0-9]+: user <unknown>:<unknown>:<unknown> attempted to access POST:/v2/snaps:install without entitlement: access denied","app_id":"canonical.snapd.snapd","type":"security","category":"AUTHZ","event":"authz_fail","user":\{"snapd-user-id":0,"store-user-name":"","store-user-email":"","expiration":"never"\},"peer":\{"socket":"/run/snapd\.socket","uid":[1-9][0-9]*,"pid":[0-9]+\},"endpoint":\{"method":"POST","path":"/v2/snaps","action":"install","access-checker":"authenticated","access-level":"authenticated"\},"authz_checks":\{"access-options":"pass","peer-credentials":"pass","socket":"pass","interface-requirements":"not-applicable","open-access":"not-applicable","user-authentication":"fail","root":"fail","polkit":"not-applicable"\},"error":\{"code":401,"kind":"login-required","message":"access denied"\}'


    # SPREAD_STORE_USER and SPREAD_STORE_PASSWORD are only available when running off master
    # core does not have expect, so skip core systems
    if [ -n "$SPREAD_STORE_USER" ] && [ -n "$SPREAD_STORE_PASSWORD" ] && os-query is-classic; then
        echo "Checking that a successful login produces an audit event"
        journal_pin
        expect -d -f "$TESTSLIB"/successful_login.exp

        journal_match '"level":"INFO","description":"User [^ ]* login success","app_id":"canonical.snapd.snapd","type":"security","category":"AUTHN","event":"authn_login_success","user":\{"snapd-user-id":[0-9]+,"store-user-name":"[^"]*","store-user-email":"[^"]*","expiration":"[^"]*"\}'

        echo "Checking that user creation produces an audit event"
        journal_match '"category":"USER","event":"user_created","user":\{"snapd-user-id":[0-9]+,"store-user-name":"[^"]*","store-user-email":"[^"]*","expiration":"[^"]*"\}'

        echo "Checking that a second login produces a user_updated audit event"
        # A second login refreshes the store macaroon and discharges, so the
        # store always returns new tokens and changed_fields will be non-empty.
        # If the store ever returns identical tokens, no user_updated event
        # will fire and this journal_match will time out.
        journal_pin
        expect -d -f "$TESTSLIB"/successful_login.exp

        journal_match '"category":"USER","event":"user_updated","user":\{"snapd-user-id":[0-9]+,"store-user-name":"[^"]*","store-user-email":"[^"]*","expiration":"[^"]*"\},"changed_fields":\[.*\]'

        echo "Checking that logout produces a user_removed audit event"
        journal_pin
        snap logout

        journal_match '"category":"USER","event":"user_removed","user":\{"snapd-user-id":[0-9]+,"store-user-name":"[^"]*","store-user-email":"[^"]*","expiration":"[^"]*"\}'
    fi
