summary: Checks that security audit events are written to the kernel audit log

details: |
    The snapd daemon writes structured security audit events via the kernel
    audit subsystem (AUDIT_TRUSTED_APP, type 1121). This test verifies that
    a failed login attempt produces an "authn_login_failure" event and,
    when store credentials are available, that a successful login produces
    an "authn_login_success" event in the audit log. It also checks that
    user lifecycle events (user_created, user_updated, user_removed) are
    recorded when users are created via login, updated on re-login, and
    removed via logout. Token lifecycle events (authn_token_created,
    authn_token_delete) are recorded when a local snapd macaroon is
    created on first login and removed on logout.

prepare: |
    python3 "$PWD/enable-audit.py"

    if ! systemctl is-active systemd-journald-audit.socket; then
        touch audit-socket-was-inactive
        systemctl stop systemd-journald.service
        systemctl start systemd-journald-audit.socket
        systemctl restart systemd-journald.service
    fi
    systemctl restart snapd.service

restore: |
    if [ -f audit-socket-was-inactive ]; then
        systemctl stop systemd-journald-audit.socket
        systemctl restart systemd-journald.service
        rm -f audit-socket-was-inactive
    fi

    snap logout || true

execute: |
    # auditd holds the netlink audit socket exclusively; if it is running,
    # journald cannot receive audit messages.
    AUDITD_ACTIVE=0
    if systemctl is-active --quiet auditd.service; then
        AUDITD_ACTIVE=1
        # If auditctl is available, use it to enable the audit subsystem.
        auditctl -e 1
    fi
    AUDIT_LOG_POS=0

    # Pin snapd journal search position to the current journal position
    journal_pin() {
        "$TESTSTOOLS"/journal-state start_new_log
    }

    # Pin the audit log position to the current end of /var/log/audit/audit.log
    audit_pin() {
        AUDIT_LOG_POS=$(wc -c < /var/log/audit/audit.log)
    }

    # Assert that journal logs since the pinned position match expression
    # Usage: journal_match <expression> [-u <unit>]
    journal_match() {
        local expression="$1"; shift
        "$TESTSTOOLS"/journal-state match-log "$expression" -n 3 "$@" >/dev/null 2>&1
    }

    # Assert that structured security events are present in the right backend.
    # If auditd is active, check /var/log/audit/audit.log; otherwise, journal.
    # Usage: security_event_match <expression>
    security_event_match() {
        local expression="$1"

        if [[ "$AUDITD_ACTIVE" -eq 1 ]]; then
            tail -c +$((AUDIT_LOG_POS+1)) /var/log/audit/audit.log | grep -Eq "$expression"
        else
            journal_match "$expression"
        fi
    }

    echo "Checking that the security logger is disabled in snapd stop and enabled on snapd start"
    if [[ "$AUDITD_ACTIVE" -eq 1 ]]; then
        echo "auditd is active; security events will be checked in /var/log/audit/audit.log"
        audit_pin
    else
        echo "auditd is not active; security events will be checked in the journal"
        journal_pin
    fi
    
    systemctl restart snapd.service
    snap wait system seed.loaded
    journal_match "security logger disabled" -u snapd.service
    journal_match "security logger enabled" -u snapd.service

    echo "Checking that restart produces disable/enable audit events"
    security_event_match '"level":"INFO","description":"Security logging enabled","app_id":"canonical.snapd.snapd","type":"security","category":"SYS","event":"sys_logging_enabled"'
    security_event_match '"level":"CRITICAL","description":"Security logging disabled","app_id":"canonical.snapd.snapd","type":"security","category":"SYS","event":"sys_logging_disabled"'

    echo "Checking that a failed login attempt produces an audit event"
    echo '{"email":"someemail@testing.com","password":"wrong-password"}' | \
        snap debug api -X POST -H 'Content-Type: application/json' /v2/login || true

    # WARN level is not being picked up by auditd, but it should be present in the journal when auditd is not active, so only check for the presence of the event when auditd is not active.
    if [ "$AUDITD_ACTIVE" -eq 0 ]; then
    	journal_match '"level":"WARN","description":"User <unknown>:someemail@testing.com:<unknown> login failure: 401:invalid credentials","app_id":"canonical.snapd.snapd","type":"security","category":"AUTHN","event":"authn_login_failure","user":\{"snapd_user_id":0,"store_user_name":"","store_user_email":"someemail@testing.com","expiration":"never"\},"error":\{"code":401,"kind":"login-required","message":"invalid credentials"\}'
    fi

    # SPREAD_STORE_USER and SPREAD_STORE_PASSWORD are only available when running off master
    # core does not have expect, so skip core systems
    if [ -n "$SPREAD_STORE_USER" ] && [ -n "$SPREAD_STORE_PASSWORD" ] && os-query is-classic && [ "$AUDITD_ACTIVE" -eq 0 ]; then
        echo "Checking that a successful login produces an audit event"
        journal_pin
        expect -d -f "$TESTSLIB"/successful_login.exp

        journal_match '"level":"INFO","description":"User [^ ]* login success","app_id":"canonical.snapd.snapd","type":"security","category":"AUTHN","event":"authn_login_success","user":\{"snapd_user_id":[0-9]+,"store_user_name":"[^"]*","store_user_email":"[^"]*","expiration":"[^"]*"\}'

        echo "Checking that user creation produces an audit event"
        journal_match '"category":"USER","event":"user_created","user":\{"snapd_user_id":[0-9]+,"store_user_name":"[^"]*","store_user_email":"[^"]*","expiration":"[^"]*"\}'

        echo "Checking that first login creates a local snapd macaroon audit event"
        journal_match '"category":"AUTHN","event":"authn_token_created".*"token_id":[0-9]+'

        echo "Checking that a second login produces a user_updated audit event"
        # A second login refreshes the store macaroon and discharges, so the
        # store always returns new tokens and changed_fields will be non-empty.
        # If the store ever returns identical tokens, no user_updated event
        # will fire and this journal_match will time out.
        journal_pin
        expect -d -f "$TESTSLIB"/successful_login.exp

        journal_match '"category":"USER","event":"user_updated","user":\{"snapd_user_id":[0-9]+,"store_user_name":"[^"]*","store_user_email":"[^"]*","expiration":"[^"]*"\},"changed_fields":\[.*\]'

        echo "Checking that logout produces a user_removed audit event"
        journal_pin
        snap logout

        journal_match '"category":"USER","event":"user_removed","user":\{"snapd_user_id":[0-9]+,"store_user_name":"[^"]*","store_user_email":"[^"]*","expiration":"[^"]*"\}'

        echo "Checking that logout removes the local snapd macaroon audit event"
        journal_match '"category":"AUTHN","event":"authn_token_delete".*"token_id":[0-9]+'
    fi
