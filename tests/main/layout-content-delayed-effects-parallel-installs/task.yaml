summary: Exercise update with multiple content connections and observe delayed effects and parallel instances

details: |
    Exercise an update where content providers have multiple consumers connected
    and observe delayed mount backend side effecs in action.

    Spice up things with parallel instances to exercise more obscure code paths.

prepare: |
    snap set system experimental.parallel-instances=true
    tests.cleanup defer snap set system experimental.parallel-instances=null

    snap install core24

execute: |
    # implicitly referred to as c1
    "$TESTSTOOLS"/snaps-state install-local test-snapd-content-consumer

    "$TESTSTOOLS"/snaps-state install-local-as test-snapd-content-consumer test-snapd-content-consumer_c2
    "$TESTSTOOLS"/snaps-state install-local-as test-snapd-content-consumer test-snapd-content-consumer_c3

    # implicitly referred to as p1
    "$TESTSTOOLS"/snaps-state install-local test-snapd-content-provider
    "$TESTSTOOLS"/snaps-state install-local-as test-snapd-content-provider test-snapd-content-provider_p2
    "$TESTSTOOLS"/snaps-state install-local-as test-snapd-content-provider test-snapd-content-provider_p3


    "$TESTSTOOLS"/snaps-state install-local test-snapd-content-provider-v2

    # prepare modified versions
    (
    cd test-snapd-content-provider
    echo 'special content mod v1' > special-content-file
    snap pack
    )

    (
    cd test-snapd-content-provider-v2
    echo 'special content mod v2' > special-content-file
    snap pack
    )

    # establish some connections
    # c1 -> p1, p2
    # c2 -> p2
    # c3 -> p2, p3

    # c1 -> p1
    snap connect test-snapd-content-consumer:special-content \
        test-snapd-content-provider:special-content
    # c1 -> p2
    snap connect test-snapd-content-consumer:special-content \
        test-snapd-content-provider_p2:special-content

    # c1 -> p-v2
    snap connect test-snapd-content-consumer:special-content-v2 \
        test-snapd-content-provider-v2:special-content-v2

    # c2 -> p2
    snap connect test-snapd-content-consumer_c2:special-content \
        test-snapd-content-provider_p2:special-content

    # c3 -> p2
    snap connect test-snapd-content-consumer_c3:special-content \
        test-snapd-content-provider_p2:special-content
    # c3 -> p3
    snap connect test-snapd-content-consumer_c3:special-content \
        test-snapd-content-provider_p3:special-content
    # c3 -> p-v2
    snap connect test-snapd-content-consumer_c3:special-content-v2 \
        test-snapd-content-provider-v2:special-content-v2

    # make sure the mount namespaces were persisted
    test-snapd-content-consumer.app | MATCH "hello from app test-snapd-content-consumer"
    # shellcheck disable=SC2016
    snap run --shell test-snapd-content-consumer.app -c \
         'cat $SNAP/connected-content{,-v2}/special-content-file' | \
         tr '\n' ';' | \
         MATCH '^special content v1;special content v2;$'
    test-snapd-content-consumer_c2.app | MATCH "hello from app test-snapd-content-consumer_c2"
    # shellcheck disable=SC2016
    snap run --shell test-snapd-content-consumer_c2.app -c \
         'cat $SNAP/connected-content/special-content-file' | \
         MATCH '^special content v1$'
    test-snapd-content-consumer_c3.app | MATCH "hello from app test-snapd-content-consumer_c3"
    # shellcheck disable=SC2016
    snap run --shell test-snapd-content-consumer_c3.app -c \
         'cat $SNAP/connected-content{,-v2}/special-content-file' | \
         tr '\n' ';' | \
         MATCH '^special content v1;special content v2;$'
    test -e /run/snapd/ns/test-snapd-content-consumer.mnt
    test -e /run/snapd/ns/test-snapd-content-consumer_c2.mnt
    test -e /run/snapd/ns/test-snapd-content-consumer_c3.mnt

    # update p1, affects test-snapd-content-consumer
    echo "Update a snap affecting test-snapd-content-contumer only"
    snap install --dangerous test-snapd-content-provider/test-snapd-content-provider_*.snap
    snap change --last install | tee change.out
    MATCH 'Done +.* +Apply delayed security backend side effects for snap "test-snapd-content-consumer"' < change.out
    # only one Apply effects task
    test "$(grep -c 'Apply delayed' < change.out)" = "1"

    # no apps were runnig, so one got discarded
    test ! -e /run/snapd/ns/test-snapd-content-consumer.mnt
    # but the other 2 remain
    test -e /run/snapd/ns/test-snapd-content-consumer_c2.mnt
    test -e /run/snapd/ns/test-snapd-content-consumer_c3.mnt

    # we observe the modified content (which recreates the mount ns0)
    # shellcheck disable=SC2016
    snap run --shell test-snapd-content-consumer.app -c \
         'cat $SNAP/connected-content{,-v2}/special-content-file' | \
         tr '\n' ';' | \
         MATCH '^special content mod v1;special content v2;$'

    # update p2, affects test-snapd-content-consumer{,_c2,_c3}
    echo "Update a snap affecting all instances of test-snapd-content-contumer (main, c2 and c3)"
    snap install --dangerous test-snapd-content-provider/test-snapd-content-provider_*.snap \
        --name test-snapd-content-provider_p2 
    snap change --last install | tee change.out
    MATCH 'Done +.* +Apply delayed security backend side effects for snap "test-snapd-content-consumer"' < change.out
    MATCH 'Done +.* +Apply delayed security backend side effects for snap "test-snapd-content-consumer_c2"' < change.out
    MATCH 'Done +.* +Apply delayed security backend side effects for snap "test-snapd-content-consumer_c3"' < change.out
    # for all 3 affected snaps
    test "$(grep -c 'Apply delayed' < change.out)" = "3"

    # all 3 were discarded
    test ! -e /run/snapd/ns/test-snapd-content-consumer.mnt
    test ! -e /run/snapd/ns/test-snapd-content-consumer_c2.mnt
    test ! -e /run/snapd/ns/test-snapd-content-consumer_c3.mnt

    # restore
    test-snapd-content-consumer.app | MATCH "hello from app test-snapd-content-consumer"
    test-snapd-content-consumer_c2.app | MATCH "hello from app test-snapd-content-consumer_c2"
    test-snapd-content-consumer_c3.app | MATCH "hello from app test-snapd-content-consumer_c3"

    # affects test-snapd-content-consumer_c3 only
    echo "Update a snap affecting test-snapd-content-contumer_c3 only"
    snap install --dangerous test-snapd-content-provider/test-snapd-content-provider_*.snap \
        --name test-snapd-content-provider_p3
    snap change --last install | tee change.out
    MATCH 'Done +.* +Apply delayed security backend side effects for snap "test-snapd-content-consumer_c3"' < change.out
    test "$(grep -c 'Apply delayed' < change.out)" = "1"

    test -e /run/snapd/ns/test-snapd-content-consumer.mnt
    test -e /run/snapd/ns/test-snapd-content-consumer_c2.mnt
    test ! -e /run/snapd/ns/test-snapd-content-consumer_c3.mnt
    # restore
    test-snapd-content-consumer_c3.app | MATCH "hello from app test-snapd-content-consumer_c3"

    # update of 2 provider snaps, affectstest-snapd-content-consumer{,_c3}
    echo "Update a snap affecting test-snapd-content-contumer and _c3"
    snap install --dangerous \
        test-snapd-content-provider/test-snapd-content-provider_*.snap \
        test-snapd-content-provider-v2/test-snapd-content-provider-v2_*.snap
    snap change --last install | tee change.out
    MATCH 'Done +.* +Apply delayed security backend side effects for snap "test-snapd-content-consumer"' < change.out
    MATCH 'Done +.* +Apply delayed security backend side effects for snap "test-snapd-content-consumer_c3"' < change.out
    test "$(grep -c 'Apply delayed' < change.out)" = "2"

    test ! -e /run/snapd/ns/test-snapd-content-consumer.mnt
    test -e /run/snapd/ns/test-snapd-content-consumer_c2.mnt
    test ! -e /run/snapd/ns/test-snapd-content-consumer_c3.mnt

    # both affected snaps see modified content
    # shellcheck disable=SC2016
    snap run --shell test-snapd-content-consumer.app -c \
         'cat $SNAP/connected-content{,-v2}/special-content-file' | \
         tr '\n' ';' | \
         MATCH '^special content mod v1;special content mod v2;$'
    # shellcheck disable=SC2016
    snap run --shell test-snapd-content-consumer_c3.app -c \
         'cat $SNAP/connected-content{,-v2}/special-content-file' | \
         tr '\n' ';' | \
         MATCH '^special content mod v1;special content mod v2;$'

    echo "Observe mount namespace update when application is running"
    # another modification
    (
    cd test-snapd-content-provider-v2
    echo 'special content mod v3' > special-content-file
    snap pack
    )

    # restore c3 mount ns
    test-snapd-content-consumer_c3.app | MATCH "hello from app test-snapd-content-consumer_c3"
    # start application that prevents the mount ns from being discarded
    snap run --shell test-snapd-content-consumer.app -c \
         'sleep 3600' &
    sleeppid=$!

    # grab info about the inode of the captured mount namespace
    before_inode="$(stat -c '%i:%y' /run/snapd/ns/test-snapd-content-consumer.mnt)"

    snap install --dangerous \
        test-snapd-content-provider/test-snapd-content-provider_*.snap \
        test-snapd-content-provider-v2/test-snapd-content-provider-v2_*.snap
    snap change --last install | tee change.out
    MATCH 'Done +.* +Apply delayed security backend side effects for snap "test-snapd-content-consumer"' < change.out
    MATCH 'Done +.* +Apply delayed security backend side effects for snap "test-snapd-content-consumer_c3"' < change.out
    test "$(grep -c 'Apply delayed' < change.out)" = "2"

    test -e /run/snapd/ns/test-snapd-content-consumer.mnt
    test -e /run/snapd/ns/test-snapd-content-consumer_c2.mnt
    test ! -e /run/snapd/ns/test-snapd-content-consumer_c3.mnt

    after_inode="$(stat -c '%i:%y' /run/snapd/ns/test-snapd-content-consumer.mnt)"
    # the moutn ns is the same, it hasn't been discarded
    test "$before_inode" = "$after_inode"

    kill "$sleeppid"
    wait || true

    # join it to observe updated content
    # TODO: the output should be:
    # > special content mod v1;special content mod v3;
    # however due to a buggy handling of mount ns upate new content is not
    # visible
    # shellcheck disable=SC2016
    snap run --shell test-snapd-content-consumer.app -c \
         'cat $SNAP/connected-content{,-v2}/special-content-file' | \
         tr '\n' ';' | \
         MATCH '^special content mod v1;special content mod v2;$'

    # discard and observe correct content'
    snapd.tool exec snap-discard-ns test-snapd-content-consumer
    # shellcheck disable=SC2016
    snap run --shell test-snapd-content-consumer.app -c \
         'cat $SNAP/connected-content{,-v2}/special-content-file' | \
         tr '\n' ';' | \
         MATCH '^special content mod v1;special content mod v3;$'
