summary: Ensure that snapctl is-ready respects the 200 ms debounce window.

details: |
  Verifies the rate-limiting (debounce) behaviour of snapctl is-ready.

  Each call to is-ready records a last-accessed timestamp in the snapd
  in-memory state cache.  If is-ready is called again before 200 ms have
  elapsed since that timestamp, the command sleeps for the remaining window
  before returning.

  The test creates a change via a synchronous snapctl command, then calls
  is-ready twice in quick succession.  The first call has no prior cache entry
  and returns immediately.  The second call falls within the 200 ms debounce
  window and must sleep for the remainder of that window.  The elapsed time of
  the second call is measured and asserted to be at least 190 ms.

systems: [ubuntu-16.04-64, ubuntu-18.04-64, ubuntu-2*, ubuntu-core-*, fedora-*]

prepare: |
  snap pack test-snap/
  snap pack test-comp/
  snap install --dangerous test-snapctl-is-ready-rl_1.0_all.snap
  snap install --dangerous "test-snapctl-is-ready-rl+comp_1.0.comp"

restore: |
  snap remove --purge test-snapctl-is-ready-rl || true

execute: |
  snap run test-snapctl-is-ready-rl.app snapctl remove +comp

  CHANGE_ID=$(snap debug api /v2/changes?select=all | \
    gojq '[.result[] | select(.kind == "snapctl-remove")] | last | .id' | \
    tr -d '"')
  test -n "$CHANGE_ID" && test "$CHANGE_ID" != "null"

  # First call: no prior last-accessed entry, returns immediately and sets
  # the cache timestamp.
  snap run test-snapctl-is-ready-rl.app snapctl is-ready "$CHANGE_ID"

  # Second call: last-accessed was just set, so we are inside the 200 ms
  # debounce window.  is-ready must sleep for the remainder of the window
  # before returning.
  T0=$(date +%s%3N)
  snap run test-snapctl-is-ready-rl.app snapctl is-ready "$CHANGE_ID"
  T1=$(date +%s%3N)
  ELAPSED=$((T1 - T0))
  echo "Second is-ready call elapsed ${ELAPSED} ms (expected >= 190 ms)"
  test "$ELAPSED" -ge 190
