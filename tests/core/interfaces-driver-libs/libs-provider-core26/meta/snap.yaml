name: libs-provider-core26
version: 1.0
base: core26
slots:
  cuda-driver-libs:
    compatibility: cuda-(9..12)-ubuntu-2604
    library-source:
      - $SNAP/libs
      - $SNAP_COMPONENT(comp1)/libs
      - $SNAP_COMPONENT(comp2)/libs
  egl-driver-libs:
    priority: 15
    compatibility: egl-1-5-ubuntu-2604
    icd-source:
      - $SNAP/egl.d
      - $SNAP_COMPONENT(comp1)/egl.d
      - $SNAP_COMPONENT(comp2)/egl.d
    library-source:
      - $SNAP/libs
      - $SNAP_COMPONENT(comp1)/libs
      - $SNAP_COMPONENT(comp2)/libs
components:
  comp1:
    type: standard
  comp2:
    type: standard
