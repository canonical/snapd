summary: Check that with the new snapd installed, we can upgrade the distro without issues.

details: |
    This test performs a series of distro upgrades until it reaches the latest devel version.
    It should be triggered from the earliest supported LTS version still in standard maintenance.
    It can run against a snap, a spread-built deb, debs from a custom PPA, or from proposed.
    After each upgrade, it checks that snapd is still working correctly and performs some simple smoke checks.
    It expects to have done an upgrade to all supported releases but the oldest or, if unavailable, the latest devel.
    This spread test has artifacts to verify snapd versions at each upgrade. Each file is named after its
    distro's codename and contains the output of `snap version --verbose` on that distro.
    Env for running on snappy-dev: SPREAD_SNAP_REEXEC=0 SPREAD_PPA_VALIDATION_NAME=ppa:snappy-dev/image
    Env for running on proposed: SPREAD_SNAP_REEXEC=0 SPREAD_SRU_VALIDATION=1

# This test should only be run on the lowest supported version of ubuntu for a given release
systems:
    - ubuntu-2*

manual: true

warn-timeout: 10m
kill-timeout: 90m

artifacts: 
    - snapd-versions

prepare: |
    current=$(ubuntu-distro-info --supported --release | awk '{print $1}' | head -1)
    if ! os.query is-ubuntu "$current"; then
        echo "This test should be run on the lowest supported version of ubuntu for a given release, which is currently $current"
        exit 1
    fi
    snap install go-example-webserver
    snap install test-snapd-sh
    snap install test-snapd-auto-aliases
    "$TESTSTOOLS"/snaps-state install-local test-snapd-classic-confinement --classic

    snap connections go-example-webserver > webserver-connections.txt
    snap list | grep -v "^snapd[[:space:]]" > snap-list.txt
    sed -i 's/Prompt=.*/Prompt=normal/' /etc/update-manager/release-upgrades
    if not tests.info is-reexec-in-use && tests.info is-snapd-from-archive; then
        . /etc/os-release
        version_id_re="${VERSION_ID//./\\.}"
        snap version | grep -E '^snap[[:space:]]' | MATCH "[0-9]+[.][0-9]+([.][0-9]+)?([.][0-9]+)?[+]ubuntu${version_id_re}([.][0-9]+)?"
        snap version | grep -E '^snapd[[:space:]]' | MATCH "[0-9]+[.][0-9]+([.][0-9]+)?([.][0-9]+)?[+]ubuntu${version_id_re}([.][0-9]+)?"
    else
        snap version | grep -E '^snap[[:space:]]' | MATCH "1337[.][0-9]+([.][0-9]+)?([.][0-9]+)?"
        snap version | grep -E '^snapd[[:space:]]' | MATCH "1337[.][0-9]+([.][0-9]+)?([.][0-9]+)?"
    fi
    snap version | grep -E '^snapd[[:space:]]' | awk '{print $2}' | sed 's/+ubuntu.*//' > initial-snapd-version.txt

    mkdir snapd-versions

restore: |
    snap remove --purge go-example-webserver
    snap remove --purge test-snapd-sh
    snap remove --purge test-snapd-auto-aliases
    snap remove --purge test-snapd-classic-confinement
    sed -i 's/Prompt=.*/Prompt=never/' /etc/update-manager/release-upgrades

execute: |
    sed -i 's/Prompt=.*/Prompt=normal/' /etc/update-manager/release-upgrades
    
    # Grab all supported distros except for the first one, which we're running on
    mapfile -t upgrades < <(ubuntu-distro-info --supported --release | awk '{print $1}' | sed 1d)

    #####################################################################################
    # The upgrades array contains the distros that we will be upgrading to.
    # To manually supply the upgrades, uncomment this next line with desired versions.
    # upgrades=(24.04 25.10 26.04)
    #####################################################################################

    # Don't fail the test if the distro is missing the latest snapd version. Sometimes one distro
    # doesn't have the latest yet.
    ./check-snapd-version.sh "$(cat initial-snapd-version.txt)" || [ "$SRU_VALIDATION" = "1" ]
    snap version --verbose > snapd-versions/"$(lsb_release -c -s)"

    while ! os.query is-ubuntu "${upgrades[${#upgrades[@]}-1]}"; do
        # We can only upgrade the distro if we have all upgrades installed
        apt update
        apt upgrade -y
        if [[ "$SPREAD_REBOOT" = 0 ]]; then
            REBOOT
        fi

        echo "Upgrading $(grep -oP 'CODENAME=\K.*' /etc/os-release | head -1)"
        sudo do-release-upgrade -f DistUpgradeViewNonInteractive || \
            sudo do-release-upgrade -d -f DistUpgradeViewNonInteractive

        if [ "$SRU_VALIDATION" = "1" ] || [ -n "$PPA_VALIDATION_NAME" ]; then
            #shellcheck source=tests/lib/pkgdb.sh
            . "$TESTSLIB"/pkgdb.sh
            distro_install_build_snapd
        fi

        #shellcheck source=tests/lib/prepare.sh
        . "$TESTSLIB"/prepare.sh
        prepare_each_classic

        ./check-snapd.sh
        # Don't fail the test if the distro is missing the latest snapd version. Sometimes one distro
        # doesn't have the latest yet.
        ./check-snapd-version.sh "$(cat initial-snapd-version.txt)" || [ "$SRU_VALIDATION" = "1" ]
        snap version --verbose > snapd-versions/"$(lsb_release -c -s)"

        touch "$(grep -oP 'VERSION_ID="\K.*[^"]+' /etc/os-release)-done"

        # If the last upgrade cannot be performed, break
        if [[ ${#upgrades[@]} -ge 2 ]] && os.query is-ubuntu "${upgrades[${#upgrades[@]}-2]}" && ! grep -qF "${upgrades[${#upgrades[@]}-1]}" <<<"$(do-release-upgrade -d -c)"; then
            last_upgrade_index=$((${#upgrades[@]} - 1))
            unset "upgrades[$last_upgrade_index]"
            break
        fi

        SPREAD_REBOOT=0
    done

    for upgrade in "${upgrades[@]}"; do
        if [ ! -f "$upgrade-done" ]; then
            echo "Upgrade to $upgrade failed."
            exit 1
        fi
    done
