parameters:
  - name: account
    in: path
    required: true
    schema:
      type: string
    example: system
  - name: confdb-schema
    in: path
    required: true
    schema:
      type: string
    example: network
  - name: view
    in: path
    required: true
    schema:
      type: string
    examples:
      admin:
        value: wifi-admin
        summary: Write/control access
      state:
        value: wifi-state
        summary: Read-only access

get:
  tags:
    - Asynchronous
    - AuthenticationRequired
    - Experimental
  summary: Get configurations from confdb
  description: |-
    Retrieves configuration values from confdb.
  operationId: getConfdb
  security:
    - PeerAuth: []
  parameters:
    - name: keys
      in: query
      description: |-
        A comma-separated list of configuration paths to read from. These paths
        refer to rules defined in the view specified in the URL. If no list is
        provided, the GET will match with all readable view rules and return any
        stored values for those. If there are no stored configuration values for
        a subset of the fields, those fields will be omitted from the result
        object.
      schema:
        type: string
    - name: constraints
      in: query
      description: |-
        A JSON object holding values used to constrain parameters, keyed by the
        parameter names. Used to filter data according to the placeholders and 
        field filters in the matched requests.
      schema:
        type: string

  responses:
    202:
      $ref: '../components/responses/Accepted.yaml'
    400:
      $ref: '../components/responses/BadRequest.yaml'

put:
  tags:
    - Asynchronous
    - AuthenticationRequired
    - Experimental
  summary: Set configurations in confdb
  description: |-
    Sets configuration values in confdb.
  operationId: setConfdb
  security:
    - PeerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - values
          properties:
            values:
              type: object
              description: |-
                A map of configuration paths to JSON values to be set.
                Use null to unset a value.
              additionalProperties: true
          example:
            values:
              office.ssid: foo
              password: null
  responses:
    202:
      $ref: '../components/responses/Accepted.yaml'
    400:
      $ref: '../components/responses/BadRequest.yaml'
