type: object
title: SystemVolumesActionCheckPassphraseQuality
description: Payload to check the quality of a passphrase for system volume authentication.
required:
  - action
  - passphrase
properties:
  action:
    type: string
    enum:
      - check-passphrase-quality
      - check-passphrase
  passphrase:
    type: string
    format: password
    description: The passphrase to check.
