type: object
title: SystemVolumesActionCheckPinQuality
description: Payload to check the quality of a PIN for system volume authentication.
required:
  - action
  - pin
properties:
  action:
    type: string
    enum:
      - check-pin-quality
  pin:
    type: string
    format: password
    description: The PIN to check.
