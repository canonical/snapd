type: object
title: SystemVolumesAuthQualityResult
description: Authentication quality information for a passphrase or PIN.
properties:
  entropy-bits:
    type: integer
    format: int32
    example: 80
  min-entropy-bits:
    type: integer
    format: int32
    example: 42
  optimal-entropy-bits:
    type: integer
    format: int32
    example: 100
