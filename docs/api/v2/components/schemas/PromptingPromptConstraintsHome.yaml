type: object
description: Represents the constraints associated with a prompt for the home interface.
required:
  - path
  - requested-permissions
  - available-permissions
properties:
  path:
    type: string
    description: |
      The path for which access is requested.

      Any characters which are considered special in reply path patterns will
      be escaped by a backslash ('\') character. That way, the "path" field in the prompt
      can be used directly as the "path-pattern" field in a reply and exactly
      match the requested path.
    example: /home/ubuntu/Downloads/image.png
  requested-permissions:
    type: array
    description: The permissions for which access is requested.
    items:
      type: string
      enum:
        - read
        - write
        - execute
  available-permissions:
    type: array
    description: The complete list of permissions for the home interface.
    items:
      type: string
      enum:
        - read
        - write
        - execute
