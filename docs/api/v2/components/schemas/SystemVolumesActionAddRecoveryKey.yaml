type: object
title: SystemVolumesActionAddRecoveryKey
description: Payload to add a generated recovery key to one or more key slots.
required:
  - action
  - key-id
  - keyslots
properties:
  action:
    type: string
    enum:
      - add-recovery-key
  key-id:
    type: string
    description: The recovery key ID produced by `generate-recovery-key`.
    example: key-id-1
  keyslots:
    type: array
    description: Key slots targeted by the action.
    items:
      $ref: './SystemVolumesKeyslotRef.yaml'
