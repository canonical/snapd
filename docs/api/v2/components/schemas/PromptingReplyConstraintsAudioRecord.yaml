type: object
description: Represents the constraints associated with a reply to a prompt for the audio-record interface.
required:
  - permissions
properties:
  permissions:
    type: array
    description: The permissions applied to requests to access microphones via the audio-record interface.
    items:
      type: string
      enum:
        - access
