type: object
required:
  - message
  - kind
  - value
properties:
  message:
    type: string
    description: A human-readable error message explaining the error.
    example: 'permissions in reply constraints do not include all requested permissions [read]: [write]'
  kind:
    type: string
    description: A machine-readable string identifying the error type.
    enum:
      - interfaces-requests-reply-not-match-request
  value:
    oneOf:
      - type: object
        required:
          - requested-path
          - replied-pattern
        properties:
          requested-path:
            type: string
            example: "/home/ubuntu/Documents/file.txt"
          replied-pattern:
            type: string
            example: "/home/ubuntu/Pictures/**/*.txt"
      - type: object
        required:
          - requested-permissions
          - replied-permissions
        properties:
          requested-permissions:
            type: array
            items:
              type: string
          replied-permissions:
            type: array
            items:
              type: string
