type: object
required:
  - message
  - kind
properties:
  message:
    type: string
    description: A human-readable error message explaining the error.
    enum:
      - AppArmor Prompting is not running
  kind:
    type: string
    description: A machine-readable string identifying the error type.
    enum:
      - apparmor-prompting-not-running
