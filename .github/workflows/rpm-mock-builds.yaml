name: Build rpm package

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'A json list of tags to indicate which runner to use'
        required: true
        type: string
      system:
        description: 'The system, as known to spread, to build the rpm package for'
        required: true
        type: string
      pkg-dir:
        description: 'The name of the relevant folder in packaging directory'
        required: true
        type: string
      config:
        description: 'The name of the mock config file'
        required: true
        type: string

jobs:
  build-rpm:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Download source tarballs
      uses: actions/download-artifact@v8
      with:
        name: source-tarball
        path: /tmp/source

    - name: Extract version from tarball
      run: |
        version=$(ls /tmp/source/snapd_*.no-vendor.tar.xz | sed -E 's/.*snapd_(.*)\.no-vendor.*/\1/')
        echo "PKG_VERSION=$version" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        push: false
        load: true
        file: tests/lib/packaging/fedora.dockerfile
        tags: mock-base:latest

    - name: Create cache key
      # Force a cache refresh once a week by using the year and week number as part of the cache key
      run: echo "CACHE_KEY=mock-cache-${{ inputs.system }}-$(date '+%Y-%U')" >> $GITHUB_ENV

    - name: Cache mock dependencies
      uses: actions/cache@v5
      with:
        path: /tmp/mock
        key: ${{ env.CACHE_KEY }}

    - name: Set version in spec
      run: |
        sed -i -e "s/^Version:.*$/Version: ${{ env.PKG_VERSION }}/g" "packaging/${{ inputs.pkg-dir }}/snapd.spec"

    - name: Build rpm
      run: |
        chmod -R o+rw .
        mkdir -p /tmp/mock
        mkdir -p /tmp/builds
        chmod -R o+rw /tmp/builds
        docker run --privileged --rm \
          --mount type=bind,src=/tmp/mock,dst=/var/cache/mock \
          --mount type=bind,src=$(pwd),dst=/home/mockbuilder/snapd \
          --mount type=bind,src=/tmp/source,dst=/tmp/source \
          --mount type=bind,src=/tmp/builds,dst=/home/mockbuilder/builds \
          mock-base:latest \
          bash -c "
            cd /home/mockbuilder/snapd && \
            tests/lib/packaging/build-rpm-mock.sh \
              --pkg-dir ${{ inputs.pkg-dir }} \
              --vendor-tar-dir /tmp/source \
              --config-file /etc/mock/${{ inputs.config }}.cfg
          "
        mkdir /tmp/uploads
        sudo find /tmp/builds/* -type f \
          ! -name '*debug*' \
          ! -name '*.src.rpm' \
          -name '*.rpm' \
          -exec mv {} /tmp/uploads \;

    - name: upload packages
      uses: actions/upload-artifact@v7
      with:
        name: package-${{ inputs.system }}
        path: /tmp/uploads
