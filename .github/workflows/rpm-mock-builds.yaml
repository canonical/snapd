name: Build rpm package

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'A json list of tags to indicate which runner to use'
        required: true
        type: string
      system:
        description: 'The system, as known to spread, to build the rpm package for'
        required: true
        type: string
      pkg-dir:
        description: 'The name of the relevant folder in packaging directory'
        required: true
        type: string
      config:
        description: 'The name of the mock config file'
        required: true
        type: string

jobs:
  build-rpm:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Download source tarball
      uses: actions/download-artifact@v8
      with:
        name: source-tarball
        path: packaging/.build

    - name: Restore volume cache
      uses: actions/cache@v4
      with:
        path: packaging/${{ inputs.pkg-dir }}/.cache/
        key: pkg-cache-${{ inputs.pkg-dir }}-v1-${{ hashFiles('go.mod', 'c-vendor/**') }}
        restore-keys: |
          pkg-cache-${{ inputs.pkg-dir }}-v1-

    - name: Build rpm package
      run: |
        # Map packaging directory name from workflow input
        distro="${{ inputs.pkg-dir }}"

        # Prepare build environment
        mkdir -p /tmp/builds

        # Import cached volumes before build
        packaging/cache-volumes.sh "$distro" import

        # Run build using kulturysta from the packaging directory
        cd "packaging/$distro"
        ../kulturysta --no-tests

        # Export volumes after build for caching
        ../cache-volumes.sh "$distro" export

        # Collect built packages
        find .build -maxdepth 1 -name "*.rpm" ! -name "*debug*" ! -name "*.src.rpm" -exec cp {} /tmp/builds/ \;

    - name: upload packages
      uses: actions/upload-artifact@v7
      with:
        name: package-${{ inputs.system }}
        path: /tmp/builds
