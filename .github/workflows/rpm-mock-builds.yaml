name: Build rpm package

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'A json list of tags to indicate which runner to use'
        required: true
        type: string
      system:
        description: 'The system, as known to spread, to build the rpm package for'
        required: true
        type: string
      pkg-dir:
        description: 'The name of the relevant folder in packaging directory'
        required: true
        type: string
      config:
        description: 'The name of the mock config file'
        required: true
        type: string

jobs:
  build-rpm:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Download source tarball
      uses: actions/download-artifact@v8
      with:
        name: source-tarball
        path: /tmp/source

    - name: Extract source tarball
      run: |
        # Extract both tarballs (no-vendor and only-vendor) into .build/
        mkdir -p .build
        tar -xf /tmp/source/snapd_*.no-vendor.tar.xz -C .build
        tar -xf /tmp/source/snapd_*.only-vendor.tar.xz -C .build

        # Both tarballs have snapd-<version>/ prefix, merging into single directory
        snapd_dir=$(find .build -maxdepth 1 -type d -name 'snapd-*' | head -1)
        if [ -z "$snapd_dir" ]; then
            echo "ERROR: No snapd directory found after extraction"
            exit 1
        fi

        # Move snapd-<version>/* to .build/ so kulturysta has expected layout
        mv "$snapd_dir"/* .build/
        rmdir "$snapd_dir"

    - name: Install podman
      run: |
        sudo dnf install -y podman

    - name: Create cache key
      # Force a cache refresh once a week by using the year and week number as part of the cache key
      run: echo "CACHE_KEY=podman-cache-${{ inputs.system }}-$(date '+%Y-%U')" >> $GITHUB_ENV

    - name: Cache podman volumes
      uses: actions/cache@v5
      with:
        path: /tmp/podman-cache
        key: ${{ env.CACHE_KEY }}

    - name: Build rpm package
      run: |
        # Map packaging directory name from workflow input
        distro="${{ inputs.pkg-dir }}"

        # Prepare build environment
        mkdir -p /tmp/builds
        mkdir -p /tmp/podman-cache

        # Run build using kulturysta + podman via build-ci.sh wrapper
        packaging/build-ci.sh "$distro"

        # Collect built packages
        find .build -maxdepth 1 -name "*.rpm" ! -name "*debug*" ! -name "*.src.rpm" -exec cp {} /tmp/builds/ \;

    - name: upload packages
      uses: actions/upload-artifact@v7
      with:
        name: package-${{ inputs.system }}
        path: /tmp/builds
