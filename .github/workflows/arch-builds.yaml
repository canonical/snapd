name: Build arch package

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'A json list of tags to indicate which runner to use'
        required: true
        type: string

jobs:
  build-arch:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Download source tarball
      uses: actions/download-artifact@v8
      with:
        name: source-tarball
        path: packaging/.build

    - name: Install podman
      run: |
        sudo apt-get update
        sudo apt-get install -y podman

    - name: Build arch package
      run: |
        # Map distro name for arch packaging
        distro="arch"

        # Prepare build environment
        mkdir -p /tmp/uploads

        # Run build using kulturysta from the packaging directory
        cd "packaging/$distro"
        ../../kulturysta

        # Collect built packages
        find .build -maxdepth 1 -name "*.pkg.tar.*" -exec cp {} /tmp/uploads/ \;

    - name: upload packages
      uses: actions/upload-artifact@v7
      with:
        name: package-arch-linux-64
        path: /tmp/uploads
