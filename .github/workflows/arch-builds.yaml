name: Build arch package

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'A json list of tags to indicate which runner to use'
        required: true
        type: string

jobs:
  build-arch:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Download source tarballs
      uses: actions/download-artifact@v8
      with:
        name: source-tarball
        path: /tmp/source

    - name: Extract version from tarball
      run: |
        version=$(ls /tmp/source/snapd_*.vendor.tar.xz | sed -E 's/.*snapd_(.*)\.vendor.*/\1/')
        echo "PKG_VERSION=$version" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        push: false
        load: true
        file: tests/lib/packaging/arch.dockerfile
        tags: arch-base:latest

    - name: Set version in spec
      run: |
        sed -i -e "s/pkgver=.*/pkgver=${{ env.PKG_VERSION }}/" packaging/arch/PKGBUILD

    - name: Build arch pkg
      run: |
        chmod -R a+w .
        docker run --cap-add SYS_ADMIN --rm \
          --mount type=bind,src=$(pwd),dst=/home/test/snapd \
          --mount type=bind,src=/tmp/source,dst=/tmp/source \
          arch-base:latest \
          bash -c "
            cd /home/test/snapd && \
            tests/lib/packaging/build-arch.sh --user test --build-dir /tmp/source/
          "
        mkdir /tmp/uploads
        sudo find /tmp/source/* -name '*.pkg.tar.*' -exec mv {} /tmp/uploads \;

    - name: upload packages
      uses: actions/upload-artifact@v7
      with:
        name: package-arch-linux-64
        path: /tmp/uploads
