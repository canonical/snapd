name: Build deb package

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'A json list of tags to indicate which runner to use'
        required: true
        type: string
      os:
        description: 'The OS to build the deb package for'
        required: true
        type: string
      os-version:
        description: 'The OS version to build the deb package for'
        required: true
        type: string
      system:
        description: 'The system name as known by spread'
        required: true
        type: string

jobs:
  build-deb:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Download source tarball
      uses: actions/download-artifact@v8
      with:
        name: source-tarball
        path: packaging/.build

    - name: Build deb package
      run: |
        # Map distro name from workflow inputs to packaging directory name
        target_system="${{ inputs.os }}-${{ inputs.os-version }}"
        case "$target_system" in
            debian-sid)
                distro="debian-sid"
                ;;
            ubuntu-*)
                distro="debian-sid"
                ;;
            *)
                echo "unsupported deb packaging for $target_system"
                exit 1
                ;;
        esac

        # Run build using kulturysta from the packaging directory
        cd "packaging/$distro"
        ../kulturysta --no-tests

        # Collect built packages
        mkdir -p /tmp/builds
        find .build -maxdepth 1 -name "*.deb" -exec cp {} /tmp/builds/ \;

    - name: upload packages
      uses: actions/upload-artifact@v7
      with:
        name: package-${{ inputs.system }}
        path: /tmp/builds/
