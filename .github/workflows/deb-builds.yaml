name: Build deb package

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'A json list of tags to indicate which runner to use'
        required: true
        type: string
      os:
        description: 'The OS to build the deb package for'
        required: true
        type: string
      os-version:
        description: 'The OS version to build the deb package for'
        required: true
        type: string
      system:
        description: 'The system name as known by spread'
        required: true
        type: string

jobs:
  build-deb:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Download source tarball
      uses: actions/download-artifact@v8
      with:
        name: source-tarball
        path: /tmp/source

    - name: Extract source tarball
      run: |
        # Extract both tarballs (no-vendor and only-vendor) into .build/
        mkdir -p .build
        tar -xf /tmp/source/snapd_*.no-vendor.tar.xz -C .build
        tar -xf /tmp/source/snapd_*.only-vendor.tar.xz -C .build

        # Both tarballs have snapd-<version>/ prefix, merging into single directory
        snapd_dir=$(find .build -maxdepth 1 -type d -name 'snapd-*' | head -1)
        if [ -z "$snapd_dir" ]; then
            echo "ERROR: No snapd directory found after extraction"
            exit 1
        fi

        # Move snapd-<version>/* to .build/ so kulturysta has expected layout
        mv "$snapd_dir"/* .build/
        rmdir "$snapd_dir"

    - name: Install podman
      run: |
        sudo apt-get update
        sudo apt-get install -y podman

    - name: Build deb package
      run: |
        # Map distro name from workflow inputs to packaging directory name
        target_system="${{ inputs.os }}-${{ inputs.os-version }}"
        case "$target_system" in
            debian-sid)
                distro="debian-sid"
                ;;
            ubuntu-*)
                distro="debian-sid"
                ;;
            *)
                echo "unsupported deb packaging for $target_system"
                exit 1
                ;;
        esac

        # Run build using kulturysta + podman via build-ci.sh wrapper
        packaging/build-ci.sh "$distro"

        # Collect built packages
        mkdir -p /tmp/builds
        find .build -maxdepth 1 -name "*.deb" -exec cp {} /tmp/builds/ \;

    - name: upload packages
      uses: actions/upload-artifact@v7
      with:
        name: package-${{ inputs.system }}
        path: /tmp/builds/
