name: Build rpm package (rpmbuild)

on:
  workflow_call:
    inputs:
      runs-on:
        description: 'A json list of tags to indicate which runner to use'
        required: true
        type: string
      pkg-dir:
        description: 'The directory name in packaging'
        required: true
        type: string
      system:
        description: 'The system name as known by spread'
        required: true
        type: string

jobs:
  build-rpm:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Download source tarball
      uses: actions/download-artifact@v8
      with:
        name: source-tarball
        path: packaging/.build

    - name: Install podman
      run: |
        sudo apt-get update
        sudo apt-get install -y podman

    - name: Build rpm package
      run: |
        # Map packaging directory name from workflow input
        distro="${{ inputs.pkg-dir }}"

        # Prepare build environment
        mkdir -p /tmp/uploads

        # Run build using kulturysta from the packaging directory
        cd "packaging/$distro"
        ../../kulturysta

        # Collect built packages
        find .build -maxdepth 1 -name "*.rpm" ! -name "*debug*" ! -name "*.src.rpm" -exec cp {} /tmp/uploads/ \;

    - name: Upload packages
      uses: actions/upload-artifact@v7
      with:
        name: package-${{ inputs.system }}
        path: /tmp/uploads
