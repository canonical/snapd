name: MacOS quick checks
on:
  # Only run on pull requests: not pushes
  pull_request:
    branches: ["master", "release/**", "fde-manager-features"]

jobs:
  macos-quick:
    runs-on: macos-latest
    steps:
      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install squashfs from homebrew
        run: |
          brew install squashfs

      - name: Build quick checks
        run: |
          go mod vendor
          ./mkversion.sh
          go build -tags nosecboot -o /tmp/snap ./cmd/snapd

      - name: Runtime quick checks
        run: |
          /tmp/snap download hello
          /tmp/snap version
          if command -v mksquashfs; then
            /tmp/snap pack tests/lib/snaps/test-snapd-tools/ /tmp
          fi
